<!DOCTYPE html>
<html lang="pt-BR">    
<head>

    <meta property="og:title" content="Convite Especial: 1 aninho da Cecilia! ✨">
    <meta property="og:description" content="Venha celebrar conosco este momento mágico!">
    <meta property="og:image" content="https://raw.githubusercontent.com/alysonbackkuhnen/convite-cecilia/main/img-chield.jpg">
    <!-- <meta property="og:image:type" content="image/jpeg">
    <meta property="og:image:width" content="600">
    <meta property="og:image:height" content="600"> -->
    <meta property="og:type" content="website">






    <title>Convite - 1º Aniversário da Cecilia</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Crimson+Text:wght@400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #f8f0f8 0%, #fffaf0 50%, #f0f8ff 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Crimson Text', serif;
            overflow: hidden;
            animation: backgroundShift 20s infinite alternate;
        }

        @keyframes backgroundShift {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        .invitation-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            text-align: center;
            box-shadow:
                0 20px 40px rgba(0, 0, 0, 0.1),
                0 0 0 8px rgba(255, 182, 193, 0.2),
                0 0 0 16px rgba(173, 216, 230, 0.1);
            position: relative;
            overflow: hidden;
            animation: fadeInUp 2s ease-out;
            border: 2px solid #ffb6c1;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(50px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .magic-border {
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            border-radius: 22px;
            background: linear-gradient(45deg, #ffb6c1, #87ceeb, #d8bfd8, #98fb98);
            background-size: 400% 400%;
            animation: shimmer 3s ease infinite;
            z-index: -1;
        }

        @keyframes shimmer {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .header {
            margin-bottom: 30px;
        }

        .title {
            font-family: 'Playfair Display', serif;
            font-size: 2.5em;
            color: #d8417a;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            animation: titleGlow 3s infinite alternate;
        }

        @keyframes titleGlow {
            from { text-shadow: 2px 2px 4px rgba(216, 65, 122, 0.3); }
            to { text-shadow: 2px 2px 8px rgba(216, 65, 122, 0.6); }
        }

        .subtitle {
            font-size: 1.2em;
            color: #6a5acd;
            margin-bottom: 20px;
            animation: fadeIn 2s ease-out 0.5s both;
        }

        .cecilia-name {
            font-family: 'Playfair Display', serif;
            font-size: 3em;
            color: #ff69b4;
            margin: 20px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: bounce 2s infinite;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.2);
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }

        .details {
            background: linear-gradient(135deg, #fff0f5 0%, #f0f8ff 100%);
            padding: 25px;
            border-radius: 15px;
            margin: 25px 0;
            border: 2px dashed #87ceeb;
            animation: pulse 4s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .detail-item {
            margin: 15px 0;
            font-size: 1.1em;
            color: #4b0082;
        }

        .highlight {
            font-weight: bold;
            color: #d8417a;
            animation: highlightPulse 2s infinite;
        }

        @keyframes highlightPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .theme {
            font-style: italic;
            color: #6a5acd;
            margin: 20px 0;
            padding: 15px;
            background: rgba(255, 182, 193, 0.1);
            border-radius: 10px;
            animation: slideIn 1s ease-out 1s both;
        }

        @keyframes slideIn {
            from { transform: translateX(-100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .footer {
            margin-top: 30px;
            color: #666;
            font-size: 0.9em;
        }

        .snowflakes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .snowflake {
            position: absolute;
            color: #87ceeb;
            font-size: 1em;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); }
        }

        .disney-magic {
            position: absolute;
            width: 20px;
            height: 20px;
            background: radial-gradient(circle, #ff69b4 20%, transparent 70%);
            border-radius: 50%;
            animation: sparkle 2s infinite;
            pointer-events: none;
        }

        @keyframes sparkle {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(1); }
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background: linear-gradient(45deg, #ff69b4, #87ceeb, #98fb98);
            animation: confettiFall 5s infinite;
        }

        @keyframes confettiFall {
            0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="snowflakes" id="snowflakes"></div>
    <div class="invitation-container">
        <div class="magic-border"></div>

        <div class="header">
            <h1 class="title">✨ Convite Especial ✨</h1>
            <p class="subtitle">Você está convidado para celebrar</p>
        </div>

        <div class="cecilia-name">Cecilia</div>

        <div class="details">
            <p class="detail-item">Completa <span class="highlight\">1 aninho</span> de vida!</p>
            <p class="detail-item">📅 <span class="highlight">25 de Junho de 2026</span></p>
            <p class="detail-item">⏰ <span class="highlight">15:00 horas</span></p>
            <p class="detail-item">📍 <span class="highlight">Cascavel - PR</span></p>
        </div>

        <div class="theme">
            🍎 Tema: Branca de Neve 🕊️
        </div>

        <div class="footer">
            <p>Sua presença será nosso maior presente!</p>
            <p>✨ Este momento mágico ficará forever em nossos hearts ✨</p>
        </div>
    </div>

    <script>
        // Criar flocos de neve mágicos
        function createSnowflakes() {
            const snowflakes = document.getElementById('snowflakes');
            const symbols = ['❄️', '✨', '⭐', '💫', '🌙'];

            for (let i = 0; i < 30; i++) {
                const snowflake = document.createElement('div');
                snowflake.className = 'snowflake';
                snowflake.innerHTML = symbols[Math.floor(Math.random() * symbols.length)];

                snowflake.style.left = Math.random() * 100 + '%';
                snowflake.style.animationDuration = (Math.random() * 5 + 5) + 's';
                snowflake.style.animationDelay = Math.random() * 5 + 's';
                snowflake.style.opacity = Math.random() * 0.7 + 0.3;

                snowflakes.appendChild(snowflake);
            }
        }

        // Criar efeitos de brilho mágico
        function createMagicEffects() {
            const body = document.body;

            setInterval(() => {
                const sparkle = document.createElement('div');
                sparkle.className = 'disney-magic';

                sparkle.style.left = Math.random() * 100 + '%';
                sparkle.style.top = Math.random() * 100 + '%';
                sparkle.style.animationDuration = (Math.random() * 2 + 1) + 's';
                sparkle.style.animationDelay = Math.random() * 1 + 's';

                body.appendChild(sparkle);

                // Remover após animação
                setTimeout(() => {
                    sparkle.remove();
                }, 3000);
            }, 500);
        }

        // Criar efeito de confete
        function createConfetti() {
            const body = document.body;

            setInterval(() => {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';

                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.animationDuration = (Math.random() * 3 + 2) + 's';
                confetti.style.animationDelay = Math.random() * 1 + 's';

                body.appendChild(confetti);

                // Remover após animação
                setTimeout(() => {
                    confetti.remove();
                }, 6000);
            }, 800);
        }

        // Efeito de digitação no título
        function typeWriterEffect() {
            const title = document.querySelector('.title');
            const originalText = title.innerHTML;
            title.innerHTML = '';

            let i = 0;
            const speed = 100;

            function type() {
                if (i < originalText.length) {
                    title.innerHTML += originalText.charAt(i);
                    i++;
                    setTimeout(type, speed);
                }
            }

            setTimeout(type, 1000);
        }

        // Iniciar todos os efeitos
        document.addEventListener('DOMContentLoaded', function() {
            createSnowflakes();
            createMagicEffects();
            createConfetti();
            typeWriterEffect();

            // Efeito de interação ao clicar
            document.addEventListener('click', function(e) {
                const ripple = document.createElement('div');
                ripple.style.position = 'absolute';
                ripple.style.width = '50px';
                ripple.style.height = '50px';
                ripple.style.background = 'radial-gradient(circle, #ff69b4 20%, transparent 70%)';
                ripple.style.borderRadius = '50%';
                ripple.style.transform = 'translate(-50%, -50%) scale(0)';
                ripple.style.animation = 'ripple 1s linear';
                ripple.style.pointerEvents = 'none';

                ripple.style.left = e.clientX + 'px';
                ripple.style.top = e.clientY + 'px';

                document.body.appendChild(ripple);

                setTimeout(() => {
                    ripple.remove();
                }, 1000);
            });

            // Adicionar estilo para ripple
            const style = document.createElement('style');
            style.innerHTML = `
                @keyframes ripple {
                    to {
                        transform: translate(-50%, -50%) scale(4);
                        opacity: 0;
                    }
                }
            `;
            document.head.appendChild(style);
        });
    </script>
</body>
</html>
